<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>数据管理 · 导出</title>
<style>
  body{font-family:-apple-system,"PingFang SC",Microsoft YaHei,sans-serif;background:#f4f6fa;margin:0;padding:40px;color:#243043;}
  .box{max-width:560px;margin:0 auto;background:#fff;border-radius:16px;padding:28px 30px;box-shadow:0 6px 24px rgba(40,60,90,.08);}
  h1{font-size:20px;margin:0 0 6px;}
  .sub{color:#7a869a;font-size:13px;margin-bottom:20px;}
  label{display:block;font-size:13px;margin:14px 0 6px;color:#445;}
  input{width:100%;padding:10px 12px;border:1px solid #d8e0ed;border-radius:10px;font-size:14px;box-sizing:border-box;}
  button{margin-top:18px;width:100%;padding:11px;border:0;border-radius:10px;background:#3a6ea5;color:#fff;font-size:15px;cursor:pointer;}
  button:hover{background:#335f8f;}
  .row{display:flex;gap:12px;}
  .row a{flex:1;text-align:center;padding:11px;border-radius:10px;background:#eef3fa;color:#3a6ea5;text-decoration:none;font-size:14px;}
  .info{margin-top:18px;font-size:14px;padding:12px;border-radius:10px;background:#f6f8fc;}
  .err{color:#d23b3b;}
</style>
</head>
<body>
<div class="box">
  <h1>问卷数据管理</h1>
  <div class="sub">输入导出密钥后，可查看答题数量并下载含设备与答题留痕的明细（CSV / JSON）。</div>
  <label>导出密钥</label>
  <input id="key" type="password" placeholder="EXPORT_KEY">
  <button onclick="load()">查询数据</button>
  <div id="info" class="info" style="display:none"></div>
  <div class="row" id="links" style="display:none">
    <a id="csv" href="#">下载 CSV（含设备与答题留痕）</a>
    <a id="json" href="#">下载 JSON</a>
  </div>
</div>
<script>
function load(){
  const key=document.getElementById('key').value.trim();
  const info=document.getElementById('info');
  if(!key){info.style.display='block';info.className='info err';info.textContent='请输入密钥';return;}
  document.getElementById('csv').href='/api/export.csv?key='+encodeURIComponent(key);
  document.getElementById('json').href='/api/export?key='+encodeURIComponent(key);
  fetch('/api/export?key='+encodeURIComponent(key)).then(r=>r.json()).then(j=>{
    if(!j.success){info.style.display='block';info.className='info err';info.textContent=j.message;document.getElementById('links').style.display='none';return;}
    info.style.display='block';info.className='info';info.textContent='共 '+j.count+' 条记录。点击下方按钮下载。';
    document.getElementById('links').style.display='flex';
  }).catch(e=>{info.style.display='block';info.className='info err';info.textContent='请求失败：'+e.message;});
}
</script>
</body>
</html>
