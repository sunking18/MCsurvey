<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亲子心理健康问卷 · 二维码海报</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:#fbf5ee;display:flex;justify-content:center;padding:24px;color:#3e332b;}
  .poster{width:420px;background:#fff;border-radius:20px;box-shadow:0 8px 30px rgba(62,51,43,.12);
    overflow:hidden;border:1px solid #efe5da;}
  .top{background:linear-gradient(135deg,#e89b7b,#e07a5f);color:#fff;padding:30px 26px 26px;text-align:center;}
  .top .badge{display:inline-block;background:rgba(255,255,255,.22);font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:12px;}
  .top h1{margin:0;font-size:24px;line-height:1.35;}
  .top p{margin:12px 0 0;font-size:13.5px;opacity:.95;line-height:1.6;}
  .body{padding:26px 26px 30px;text-align:center;}
  .qr-wrap{width:250px;height:250px;margin:6px auto 14px;border:1px solid #efe5da;border-radius:14px;
    display:flex;align-items:center;justify-content:center;background:#fff;overflow:hidden;}
  .qr-wrap img,.qr-wrap canvas{width:228px;height:228px;}
  .qr-wrap .ph{font-size:12.5px;color:#b0a394;text-align:center;padding:20px;}
  .scan-tip{font-size:15px;font-weight:700;color:#e07a5f;margin:6px 0 2px;}
  .scan-sub{font-size:12.5px;color:#8a7b6c;margin:0;}
  .set{margin-top:18px;border-top:1px dashed #e3d4c5;padding-top:16px;text-align:left;}
  .set label{font-size:12px;color:#8a7b6c;display:block;margin-bottom:6px;}
  .set input{width:100%;padding:9px 11px;border:1px solid #efe5da;border-radius:9px;font-size:13px;outline:none;}
  .set input:focus{border-color:#e07a5f;background:#fbeede;}
  .note{font-size:11.5px;color:#b0a394;margin-top:12px;line-height:1.6;}
  .btn-row{margin-top:16px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}
  .btn{display:inline-block;border:none;cursor:pointer;font-size:14px;font-weight:700;color:#fff;
    background:linear-gradient(135deg,#e89b7b,#e07a5f);padding:11px 26px;border-radius:24px;}
  .btn.ghost{background:#fff;color:#e07a5f;border:1.5px solid #e07a5f;}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  @media print{
    body{background:#fff;padding:0;}
    .poster{box-shadow:none;border:none;width:100%;max-width:420px;}
    .set,.btn-row{display:none;}
  }
</style>
</head>
<body>
  <div class="poster" id="poster">
    <div class="top">
      <span class="badge">中石油职工子女心理健康项目</span>
      <h1>亲子心理健康问卷</h1>
      <p>亲爱的家长朋友，诚邀您花 5 分钟，和孩子一起了解彼此的沟通、情绪与韧性。您的参与，将为孩子的成长注入更多理解与支持。</p>
    </div>
    <div class="body">
      <div class="qr-wrap" id="qr-wrap">
        <div class="ph" id="ph">请先在下方填写问卷地址</div>
      </div>
      <div class="scan-tip">微信扫码，立即开始作答</div>
      <div class="scan-sub">作答全程保密，结果仅供您本人与项目团队参考</div>
      <div class="set">
        <label>问卷访问地址（部署后填入，二维码会自动更新）</label>
        <input id="url" type="text" placeholder="https://您的域名.example.com/index.html" value="">
        <div class="note">将本问卷部署到已备案的 HTTPS 域名后，把访问地址填到上方，二维码即指向该地址。微信扫码会在微信内直接打开问卷首页，无需登录，立即作答。</div>
      </div>
      <div class="btn-row">
        <button class="btn" id="downloadBtn" onclick="downloadPoster()">下载 PNG 海报</button>
        <button class="btn ghost" onclick="window.print()">打印 / 保存为 PDF</button>
      </div>
    </div>
  </div>

<script src="assets/qrcode.min.js"></script>
<script src="assets/html2canvas.min.js"></script>
<script>
  let qrcodeObj=null;
  function updateQR(){
    const url=document.getElementById('url').value.trim();
    const wrap=document.getElementById('qr-wrap');
    const ph=document.getElementById('ph');
    if(!url){ wrap.innerHTML=''; wrap.appendChild(ph); ph.style.display='block'; qrcodeObj=null; return; }
    ph.style.display='none';
    wrap.innerHTML='';
    qrcodeObj=new QRCode(wrap, {
      text:url,
      width:228,
      height:228,
      colorDark:'#3e332b',
      colorLight:'#ffffff',
      correctLevel:QRCode.CorrectLevel.H
    });
  }
  function downloadPoster(){
    const btn=document.getElementById('downloadBtn');
    const url=document.getElementById('url').value.trim();
    if(!url){ alert('请先在上方填写问卷访问地址，二维码生成后再下载。'); return; }
    if(typeof html2canvas!=='function'){ alert('图片生成库未加载，请检查网络或刷新页面。'); return; }
    btn.disabled=true; btn.textContent='正在生成…';
    const el=document.getElementById('poster');
    html2canvas(el, {scale:2, useCORS:true, backgroundColor:null, logging:false}).then(canvas=>{
      canvas.toBlob(blob=>{
        if(!blob){ btn.disabled=false; btn.textContent='下载 PNG 海报'; return; }
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='亲子心理健康问卷-海报.png';
        a.click();
        btn.disabled=false; btn.textContent='下载 PNG 海报';
      }, 'image/png');
    }).catch(err=>{
      console.error(err);
      alert('生成图片失败，请使用「打印 / 保存为 PDF」功能。');
      btn.disabled=false; btn.textContent='下载 PNG 海报';
    });
  }
  document.getElementById('url').addEventListener('input',updateQR);
  updateQR();
</script>
</body>
</html>
